<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Visualisation enhancement examples">
    <title>Line Chart with D3</title>

    <style>
        .x-axis path, .y-axis path,
        .x-axis line, .y-axis line {
            fill: none;
            stroke: black;
            shape-rendering: crispEdges;
        }

        .x-axis, .y-axis text {
            font-family: sans-serif;
            font-size: 10px;
        }

        h1 {
            font-family: sans-serif;
            font-weight: 300;
            font-size: 16px;
        }

        div.tooltip {
            position: absolute;
            max-width: 200px;
            height: auto;
            padding: 5px;
            background-color: white;
            -webkit-border-radius: 5px;
            -moz-border-radius: 5px;
            border-radius: 5px;
            -webkit-box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
            -moz-box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.4);
            pointer-events: none; /* MUI IMPORTANTE! */
            font-family: sans-serif;
            font-size:12px;
        }

    </style>
</head>
<body>

<h1>Sales Line Charts</h1>

<p>Show last N months:
    <select id="date-option">
        <option value="12">12</option>
        <option value="9">9</option>
        <option value="6">6</option>
        <option value="3">3</option>
    </select>
</p>

<!-- Chart container -->
<div class="chart-container">
    <div id="chart-one" class="chart"></div>
    <div id="chart-two" class="chart"></div>
</div>

<!-- Scripts -->
<script type="module" src="src/visualisation_one.js"></script>
<script type="module" src="src/visualisation_two.js"></script>

</body>
</html>
